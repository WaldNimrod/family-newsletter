# team_assignments.yaml — L0 Team Registry (Schema v1.1)
# ------------------------------------------------------
# Declares all agents used in this project.
# IRON RULE: builder_agent engine MUST differ from validator_agent engine.
# Enforcement: validate_aos.sh Check 2 (automated) + System Designer at L-GATE_ELIGIBILITY (manual).
#
# SLUG FORMAT: ^[a-z][a-z0-9]*_[a-z]+$
#   Prefix = project abbreviation (lowercase alphanumeric only, no hyphens)
#   Suffix = role (reserved: _sd / _arch / _build / _val / _doc / _gate)
#   Exactly one underscore separating prefix from suffix.
#
# ROLE TYPES (6 canonical):
#   system_designer      — human orchestrator (required)
#   architecture_agent   — spec author, LOD200/LOD400 (required)
#   builder_agent        — implementation (required; engine MUST differ from validator)
#   validator_agent      — cross-engine QA (required; engine MUST differ from builder)
#   documentation_agent  — technical writing (optional)
#   gateway_agent        — gate coordination, mandate generation (optional; EXEMPT from cross-engine rule)

project_id: "family-newsletter"
lean_kit_version: "3.4.0"

teams:
  - id: "familynewsletter_sd"
    role_type: system_designer
    engine: human
    name: "Nimrod (Team 00)"
    skills:
      - domain_knowledge
      - decision_authority
      - route_and_escalate
    notes: "Orchestrator only. Never approves content. Never substitutes for validator."

  - id: "familynewsletter_arch"
    role_type: architecture_agent
    engine: "claude-code"
    skills:
      - lod_spec_authoring
      - iron_rule_knowledge
      - mandate_issuance
    notes: "Writes LOD200, LOD400. Sonnet high-effort for zero-ambiguity LOD400 (so the lazy Grok builder builds right first time). Reviews at L-GATE_VALIDATE when required. Per REVIVAL_PLAN §3.6/§3.7.1 + team_00 mandate 2026-07-22."

  - id: "familynewsletter_build"
    role_type: builder_agent
    engine: "cursor-composer"
    skills:
      - lod400_execution
      - lod500_authoring
    notes: "Implements against LOD400. Grok via Cursor CLI (cursor-agent -m grok) is the default runtime builder — flat-cost, needs zero-ambiguity LOD400. Engine MUST differ from validator — IRON RULE. Per REVIVAL_PLAN §3.6 + team_00 mandate 2026-07-22."

  - id: "familynewsletter_val"
    role_type: validator_agent
    engine: "claude-code"
    skills:
      - independent_review
      - test_execution
      - finding_classification
    notes: "Cross-engine validator at L-GATE_VALIDATE — Claude/Sonnet high-effort. IRON RULE #1: engine != builder (Grok builds → Claude validates; canonically required, not just cost). Per REVIVAL_PLAN §3.7-ג + team_00 mandate 2026-07-22."

  # OPTIONAL roles below — include only if project requires them:

  # - id: "familynewsletter_doc"
  #   role_type: documentation_agent
  #   engine: "[any-engine]"
  #   skills:
  #     - template_completion
  #     - governance_indexing
  #   notes: "Technical writing. Optional on small projects."

  # - id: "familynewsletter_gate"
  #   role_type: gateway_agent
  #   engine: "[any-engine]"
  #   skills:
  #     - gate_coordination
  #     - mandate_generation
  #   notes: "Gate coordination. EXEMPT from cross-engine rule."

cross_engine_validator: "familynewsletter_val"

# Iron Rule enforcement:
# builder_agent engine MUST differ from validator_agent engine.
# validate_aos.sh Check 2 enforces this programmatically.
# gateway_agent is EXEMPT (does not build or validate).
