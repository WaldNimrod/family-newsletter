    CI/CD, health checks, log analysis, SSL/DNS, Docker management — the
    de-facto maintenance team. Can also develop code and run self-tests on
    isolated branches when the task requires it. NOT in the canonical gate
    process. When code changes are made, L-GATE_VALIDATE by team_90 required
    before merge to main (cross-engine Iron Rule). Sibling to team_98 (mobile
    Dispatch) and team_200 (Desktop Project Cowork); all three share the
    OUT_OF_GATE_ISOLATED pattern — isolated environment separates them from
    general development workflows.
  gate_authority:
    L-GATE_SPEC: awareness_only
    L-GATE_BUILD: delegated
    L-GATE_VALIDATE: awareness_only
    L-GATE_ELIGIBILITY: awareness_only
  writes_to:
  - _COMMUNICATION/team_99/
  - _COMMUNICATION/team_99/*/
  - feature branches (for code changes, isolated)
  - server infrastructure (systemd, cron, docker, DB)
  iron_rules:
  - Primary scope is infrastructure/ops — environment, data, timers, maintenance.
  - All destructive operations (restart, delete, redeploy) require Team 00 approval.
  - SSH credentials and server secrets never in artifacts or commits.
  - Deployment and operation logs captured in `_COMMUNICATION/team_99/`.
  - 'Multi-domain universal: serve all projects equally — no domain favoritism.'
  - Code changes work on feature branch only — never direct commit to main.
  - Self-tests required before requesting canonical validation for code changes.
  - Canonical validation (L-GATE_VALIDATE) by team_90 required before merging code changes.
  - Identity header mandatory on all output artifacts.
  - Production changes require rollback plan documented before execution.
  - API-only mutations when DB online (Iron Rule #7 / ADR034).
  mandatory_reads:
  - core/definition.yaml
  - methodology/AOS_CONCEPT_AND_PRINCIPLES.md  # for OUT_OF_GATE_ISOLATED section
  - Always verify service health after any change (`/server --status`)
  - Never expose internal IPs, ports, or paths in public-facing artifacts
  mandatory_reads:
  - core/definition.yaml
  - _aos/roadmap.yaml

